<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS — RDDL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--black); padding-top: 100px; }
    .cms-nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(8,8,8,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 20px 48px; display: flex; align-items: center; justify-content: space-between; z-index: 99; }
    .cms-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; }
    .cms-nav-links { display: flex; gap: 20px; align-items: center; }
    .cms-nav-links a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); transition: color .2s; }
    .cms-nav-links a:hover { color: var(--white); }
    .cms-main { max-width: 800px; margin: 0 auto; padding: 48px 32px 100px; }
    .cms-title { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 2px; margin-bottom: 4px; }
    .cms-sub { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 56px; }
    .cms-section { border: 1px solid var(--border); padding: 36px; margin-bottom: 24px; }
    .cms-section h3 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--red); margin-bottom: 24px; }
    .cms-field { margin-bottom: 20px; }
    .cms-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
    .cms-field input, .cms-field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 12px 16px;
      font-size: 14px;
      font-family: var(--font-body);
    }
    .cms-field input:focus, .cms-field textarea:focus { outline: none; border-color: var(--red); }
    .cms-field textarea { height: 120px; resize: vertical; }
    #save-msg { font-size: 11px; color: #44cc44; letter-spacing: 2px; margin-left: 16px; opacity: 0; transition: opacity .3s; }
    .review-mgmt { display: flex; flex-direction: column; gap: 16px; }
    .review-row { background: var(--surface); border: 1px solid var(--border); padding: 16px; display: flex; gap: 16px; align-items: flex-start; }
    .review-row-info { flex: 1; }
    .review-row-name { font-size: 13px; font-weight: 600; }
    .review-row-text { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .del-btn { background: none; border: 1px solid var(--border); color: var(--gray); padding: 6px 12px; font-size: 11px; letter-spacing: 1px; cursor: pointer; transition: all .2s; }
    .del-btn:hover { border-color: var(--red); color: var(--red); }
    .add-review-form { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
  </style>
</head>
<body>
  <nav class="cms-nav">
    <div class="cms-logo">RDDL CMS</div>
    <div class="cms-nav-links">
      <a href="index.html">View Site</a>
      <a href="#" onclick="logout()" style="color:var(--red)">Logout</a>
    </div>
  </nav>

  <div class="cms-main">
    <div class="cms-title">Dashboard</div>
    <div class="cms-sub">Content Management System</div>

    <!-- Hero Content -->
    <div class="cms-section">
      <h3>Hero Section</h3>
      <div class="cms-field">
        <label>Hero Tagline (line 3)</label>
        <input type="text" id="cms-hero-title" placeholder="e.g. LEGACY">
      </div>
      <div class="cms-field">
        <label>Hero Subtitle</label>
        <input type="text" id="cms-hero-sub" placeholder="Motivational line">
      </div>
    </div>

    <!-- About Section -->
    <div class="cms-section">
      <h3>About Section</h3>
      <div class="cms-field">
        <label>About Paragraph 1</label>
        <textarea id="cms-about1"></textarea>
      </div>
      <div class="cms-field">
        <label>About Paragraph 2</label>
        <textarea id="cms-about2"></textarea>
      </div>
    </div>

    <!-- Gym Updates (FB) -->
    <div class="cms-section">
      <h3>Gym Updates (Live Feed)</h3>
      <div class="cms-field">
        <label>Facebook / Instagram Embed Code (Paste HTML Iframe)</label>
        <textarea id="cms-fb-embed" placeholder='<iframe src="https://www.facebook.com/plugins/post.php?..." ...></iframe>'></textarea>
      </div>
    </div>

    <!-- Reviews Management -->
    <div class="cms-section">
      <h3>Reviews</h3>
      <div class="review-mgmt" id="review-mgmt"></div>
      <div class="add-review-form">
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;">Add New Review</div>
        <div class="cms-field">
          <label>Name</label>
          <input type="text" id="new-rev-name">
        </div>
        <div class="cms-field">
          <label>Stars (1-5)</label>
          <input type="number" id="new-rev-stars" min="1" max="5" value="5">
        </div>
        <div class="cms-field">
          <label>Review Text</label>
          <textarea id="new-rev-text"></textarea>
        </div>
        <div class="cms-field">
          <label>Source</label>
          <input type="text" id="new-rev-source" value="Google Maps">
        </div>
        <button class="btn-primary" onclick="addReview()">Add Review</button>
      </div>
    </div>

    <button class="btn-primary" onclick="saveAll()" style="padding:16px 48px;">Save All Changes</button>
    <span id="save-msg">Saved.</span>
  </div>

  <script src="cms.js"></script>
</body>
</html>
