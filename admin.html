<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RDDL</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--black); }
    .login-wrap { width: 400px; }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 8px; color: #FAFAFA; margin-bottom: 8px; }
    .login-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 48px; }
    .login-wrap label { display: block; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
    .login-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--white); padding: 14px 16px; font-size: 14px; margin-bottom: 24px; font-family: var(--font-body); }
    .login-wrap input:focus { outline: none; border-color: var(--red); }
    #error-msg { font-size: 12px; color: var(--red); margin-top: 12px; letter-spacing: 1px; }
    .back-link { display: block; margin-top: 24px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">RDDL</div>
    <div class="login-sub">Admin Access</div>
    <label>Email</label>
    <input type="email" id="email" value="">
    <label>Password</label>
    <input type="password" id="password">
    <button class="btn-primary" style="width:100%;padding:16px;" onclick="login()">Enter</button>
    <p id="error-msg"></p>
    <a href="index.html" class="back-link">Back to Site</a>
  </div>
  <script src="admin.js"></script>
</body>
</html>
